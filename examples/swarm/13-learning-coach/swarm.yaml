# Learning coach: teacher explains, quizzer tests understanding
nats:
  url: nats://localhost:4222

storage:
  root: ~/.local/share/swarm

agents:
  - name: teacher
    agentfile: ./agents/teacher.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: teach

  - name: quizzer
    agentfile: ./agents/quizzer.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: quiz
