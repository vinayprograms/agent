# Managed dev team — orchestrator decomposes and assigns, workers execute in isolation
nats:
  url: nats://localhost:4222

storage:
  root: ~/.local/share/swarm

agents:
  - name: orchestrator
    agentfile: ./agents/orchestrator.agent
    config: ../shared/agent.toml
    type: manager

  - name: developer
    agentfile: ./agents/developer.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: develop
    replicas: 3
