# Collaborative API design — agents self-organize via discuss.*
nats:
  url: nats://localhost:4222

storage:
  root: ~/.local/share/swarm

agents:
  - name: api-designer
    agentfile: ./agents/designer.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: design-api

  - name: implementer
    agentfile: ./agents/implementer.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: implement-api

  - name: api-tester
    agentfile: ./agents/api-tester.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: test-api
