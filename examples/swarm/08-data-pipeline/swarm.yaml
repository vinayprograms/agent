# ETL pipeline: extract → transform → load
nats:
  url: nats://localhost:4222

storage:
  root: ~/.local/share/swarm

agents:
  - name: extractor
    agentfile: ./agents/extractor.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: extract

  - name: transformer
    agentfile: ./agents/transformer.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: transform

  - name: loader
    agentfile: ./agents/loader.agent
    config: ../shared/agent.toml
    policy: ../shared/policy.toml
    capability: load
